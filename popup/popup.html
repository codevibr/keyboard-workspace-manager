<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Keyboard Workspace Manager</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Workspace</h1>
          <p>Launch tabs and windows</p>
        </div>
        <button id="openOptions" type="button" title="Open options">Options</button>
      </header>
      <label class="search">
        <span>Search</span>
        <input id="query" type="search" placeholder="Search workspaces..." autocomplete="off">
      </label>
      <section id="resultsSection">
        <h2>Results</h2>
        <div id="results" class="entries"></div>
      </section>
      <div id="emptyState" hidden>
        <strong>No matching workspace</strong>
        <span>Try a slot name, launcher tag, tab title, URL, or bookmark.</span>
      </div>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
