<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Keyboard Workspace Manager Options</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>Keyboard Workspace Manager</h1>
      <section>
        <label class="row">
          <span>
            <strong>Debug logging</strong>
            <small>Writes detailed service-worker logs while commands run.</small>
          </span>
          <input id="debug" type="checkbox">
        </label>
        <label class="row">
          <span>
            <strong>Heal pinned order</strong>
            <small>Keeps known pinned services in their configured positions.</small>
          </span>
          <input id="healPinnedOrderOnStartup" type="checkbox">
        </label>
      </section>
      <section>
        <h2>Shortcut Slots</h2>
        <div id="slots" class="slots"></div>
      </section>
      <section>
        <h2>Floating Shortcut</h2>
        <label class="row">
          <span>
            <strong>Enable floating shortcut</strong>
            <small>Assign this command manually in Chrome shortcuts if needed.</small>
          </span>
          <input id="panelEnabled" type="checkbox">
        </label>
        <label>
          Name
          <input id="panelName" type="text">
        </label>
        <label>
          URL
          <input id="panelUrl" type="url">
        </label>
        <div class="grid">
          <label>Left <input id="panelLeft" type="number"></label>
          <label>Top <input id="panelTop" type="number"></label>
          <label>Width <input id="panelWidth" type="number"></label>
          <label>Height <input id="panelHeight" type="number"></label>
        </div>
      </section>
      <footer>
        <button id="save" type="button">Save</button>
        <button id="reset" type="button">Reset Defaults</button>
        <button id="exportSettings" type="button">Export</button>
        <button id="importSettings" type="button">Import</button>
        <input id="importFile" type="file" accept="application/json,.json" hidden>
        <span id="status" role="status"></span>
      </footer>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
